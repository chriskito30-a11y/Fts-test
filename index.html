<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fais Ton Show — Rejoins-nous</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#f5f2ee;--red:#d4201a;--red-dark:#a81713;--gold:#c9a84c;--grey:#1c1c1c;--text-muted:#888}
html,body{height:100%;background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}
body::after{content:'';position:fixed;top:-30%;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(ellipse,rgba(212,32,26,.1) 0%,transparent 70%);pointer-events:none;z-index:0}
.wrapper{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1.5rem}
.header{text-align:center;margin-bottom:2.5rem;animation:fadeUp .6s ease both}
.header-eyebrow{font-size:.65rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem}
.header-title{font-family:'Bebas Neue';font-size:clamp(3rem,10vw,5.5rem);letter-spacing:.04em;color:var(--white);line-height:.95}
.header-title span{color:var(--red)}
.header-slogan{font-size:.85rem;color:var(--text-muted);margin-top:.7rem}
.header-membres{display:inline-flex;align-items:center;gap:.4rem;margin-top:1rem;font-size:.75rem;color:var(--gold);border:1px solid rgba(201,168,76,.3);padding:.4rem .9rem;border-radius:2px;text-decoration:none;transition:all .2s}
.header-membres:hover{background:rgba(201,168,76,.08)}
.header-saison{display:inline-flex;align-items:center;gap:.4rem;margin-top:.5rem;font-size:.75rem;color:var(--text-muted);border:1px solid rgba(255,255,255,.1);padding:.4rem .9rem;border-radius:2px;text-decoration:none;transition:all .2s}
.header-saison:hover{background:rgba(255,255,255,.04);color:var(--white)}
.card{width:100%;max-width:480px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:6px;backdrop-filter:blur(8px);padding:2rem;animation:fadeUp .6s .1s ease both}
.step-label{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem}
.step-question{font-family:'Bebas Neue';font-size:1.6rem;letter-spacing:.03em;margin-bottom:.4rem;line-height:1.1}
.step-desc{font-size:.8rem;color:var(--text-muted);margin-bottom:1.4rem}
.options{display:flex;flex-direction:column;gap:.6rem}
.option{display:flex;align-items:center;gap:.9rem;padding:.9rem 1rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:4px;cursor:pointer;transition:all .18s;-webkit-user-select:none;user-select:none}
.option:hover{background:rgba(212,32,26,.07);border-color:rgba(212,32,26,.3)}
.option.selected{background:rgba(212,32,26,.1);border-color:var(--red)}
.opt-icon{font-size:1.4rem;line-height:1;flex-shrink:0}
.opt-text{}
.opt-title{font-size:.88rem;font-weight:500}
.opt-desc{font-size:.72rem;color:var(--text-muted);margin-top:.15rem}
.actions{display:flex;gap:.7rem;margin-top:1.4rem}
.btn-back{padding:.65rem 1rem;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:3px;color:var(--text-muted);font-size:.78rem;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-back:hover{border-color:rgba(255,255,255,.3);color:var(--white)}
.btn-next{flex:1;padding:.65rem 1.2rem;background:var(--red);border:none;border-radius:3px;color:var(--white);font-size:.82rem;font-weight:600;cursor:pointer;transition:background .2s;font-family:'DM Sans',sans-serif}
.btn-next:disabled{background:rgba(212,32,26,.3);cursor:not-allowed}
.btn-next:not(:disabled):hover{background:var(--red-dark)}
.destination{text-align:center;animation:fadeUp .4s ease both}
.dest-badge{display:inline-block;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);color:var(--gold);font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;padding:.3rem .8rem;border-radius:2px;margin-bottom:1.2rem}
.dest-icon{font-size:3rem;margin-bottom:.8rem}
.dest-title{font-family:'Bebas Neue';font-size:2rem;letter-spacing:.03em;margin-bottom:.5rem}
.dest-desc{font-size:.82rem;color:var(--text-muted);line-height:1.6;margin-bottom:1.2rem}
.dest-details{display:flex;flex-direction:column;gap:.35rem;margin-bottom:1.5rem}
.dest-detail{display:flex;justify-content:space-between;font-size:.75rem;padding:.4rem .7rem;background:rgba(255,255,255,.03);border-radius:3px}
.dest-detail-key{color:var(--text-muted)}
.dest-detail-val{color:var(--white);font-weight:500}
.btn-helloasso{display:block;padding:.9rem 1.5rem;background:var(--red);color:var(--white);text-decoration:none;border-radius:3px;font-size:.85rem;font-weight:600;letter-spacing:.03em;text-align:center;transition:background .2s;margin-bottom:.8rem}
.btn-helloasso:hover{background:var(--red-dark)}
.btn-restart{background:transparent;border:none;color:var(--text-muted);font-size:.75rem;cursor:pointer;font-family:'DM Sans',sans-serif;padding:.4rem;transition:color .2s}
.btn-restart:hover{color:var(--white)}
.loading-wrap{text-align:center;padding:2rem 0}
.loading-spinner{display:inline-block;width:28px;height:28px;border:2px solid rgba(212,32,26,.2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
.loading-text{font-size:.75rem;color:var(--text-muted);margin-top:.8rem}
.error-wrap{text-align:center;padding:1.5rem 0}
.error-icon{font-size:2rem;margin-bottom:.6rem}
.error-msg{font-size:.8rem;color:#aa5a5a;line-height:1.5}
footer{position:relative;z-index:1;text-align:center;padding:1.5rem;font-size:.65rem;color:var(--text-muted);margin-top:auto}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrapper">

  <header class="header">
    <div class="header-eyebrow" id="h-eyebrow"></div>
    <div class="header-title" id="h-title"></div>
    <div class="header-slogan" id="h-slogan"></div>
    <a id="h-membres" class="header-membres" href="/membres">🎭 Déjà adhérent·e ? → Accéder à mon espace</a>
    <br><a class="header-saison" href="saison.html">📅 Découvrir la saison 2026/2027 →</a>
  </header>

  <div class="card" id="card">
    <div class="loading-wrap" id="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Chargement en cours…</div>
    </div>
  </div>

  <footer id="footer"></footer>

</div>
<script>
const CFG_DATA = {"name":"Fais Ton Show","eyebrow":"École des arts de la scène","slogan":"On est pas là pour faire semblant, on est là pour faire le Show !","footer":"Fais Ton Show · contact@faistonshow.fr","membresUrl":"/membres","sheetUrl":"https://docs.google.com/spreadsheets/d/e/2PACX-1vS27ZR5nQD9snZ3mNaeIxOjxyHlpWEnhKl7APAY4OZsSOiIxqyrNQ6ENLWl_A-evRtoqVxy62QUm1in/pub?gid=627892990&single=true&output=csv","step1":{"question":"C'est ta première fois avec nous ?","desc":"Pour te guider vers les bonnes options."},"step2":{"question":"Tu es nouveau ici ?","desc":"Dis-nous si tu fais déjà partie de l'aventure pour qu'on t'oriente au mieux.","categories":[{"id":"adhesion","icon":"🎫","title":"Prendre mon adhésion","desc":"Rejoindre l'association pour la saison","profiles":["new"]},{"id":"event","icon":"🎪","title":"Acheter une place","desc":"Spectacles, soirées, showcases…","profiles":["member","new"]},{"id":"goodie","icon":"🛍️","title":"Commander des goodies","desc":"T-shirts, accessoires, merch…","profiles":["member","new"]},{"id":"renew","icon":"🔄","title":"Renouveler mon adhésion","desc":"Rempiler pour une nouvelle saison","profiles":["member"]}]},"step3Questions":{"adhesion":{"q":"Quel type d'adhésion ?","d":"Choisis la formule adaptée à ta situation."},"event":{"q":"Quel événement t'intéresse ?","d":"Sélectionne le prochain show qui t'attire."},"goodie":{"q":"Que cherches-tu ?","d":"Notre boutique officielle sur HelloAsso."},"renew":{"q":"Ton type d'adhésion ?","d":"Même formule ou changement de catégorie ?"}}};

const state = { step1:null, step2:null, step3:null };
let step3Options = {};

// ── CSV PARSER ──────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (!lines.length) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,'').toLowerCase());
  return lines.slice(1).map(line => {
    const vals = [];
    let val='', inQ=false;
    for (let i=0; i<line.length; i++) {
      if (line[i]==='"') { inQ=!inQ; }
      else if (line[i]===',' && !inQ) { vals.push(val.trim()); val=''; }
      else { val+=line[i]; }
    }
    vals.push(val.trim());
    const obj={};
    headers.forEach((h,i) => obj[h]=(vals[i]||'').replace(/^"|"$/g,''));
    return obj;
  }).filter(r => r['type'] && r['titre']);
}

// ── BUILD STEP3OPTIONS FROM ROWS ────────────────────
function buildStep3Options(rows) {
  const result = {};
  rows.forEach(row => {
    const type = row['type'].toLowerCase();
    if (!result[type]) {
      const q3 = CFG_DATA.step3Questions[type] || { q:'Choisis une option', d:'' };
      result[type] = { question: q3.q, desc: q3.d, options: [] };
    }
    const detail = [];
    if (row['detail1_cle'] && row['detail1_valeur']) detail.push([row['detail1_cle'], row['detail1_valeur']]);
    if (row['detail2_cle'] && row['detail2_valeur']) detail.push([row['detail2_cle'], row['detail2_valeur']]);
    result[type].options.push({
      id:         type + '_' + result[type].options.length,
      icon:      row['icon']        || '🎭',
      title:      row['titre']        || '',
      desc:      row['description'] || '',
      detail:    detail,
      link:      row['lien']        || '#',
      destTitle: row['dest_titre']  || row['titre'] || '',
      destDesc:  row['dest_desc']   || row['description'] || ''
    });
  });
  return result;
}

// ── LOAD FROM SHEET ─────────────────────────────────
async function loadSheet() {
  try {
    const r = await fetch(CFG_DATA.sheetUrl);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const text = await r.text();
    const rows = parseCSV(text);
    if (!rows.length) throw new Error('Sheet vide');
    step3Options = buildStep3Options(rows);
    initUI();
  } catch(e) {
    document.getElementById('card').innerHTML = `<div class="error-wrap">
      <div class="error-icon">⚠️</div>
      <div class="error-msg">Impossible de charger les données.<br>Vérifiez votre connexion ou contactez l'association.</div>
    </div>`;
  }
}

// ── INIT UI ─────────────────────────────────────────
function initUI() {
  const nameParts = CFG_DATA.name.split(' ');
  const last = nameParts.pop();
  document.getElementById('h-eyebrow').textContent = CFG_DATA.eyebrow;
  document.getElementById('h-title').innerHTML = (nameParts.length ? nameParts.join(' ') + '<br>' : '') + '<span>' + last + '</span>';
  document.getElementById('h-slogan').textContent = CFG_DATA.slogan;
  document.getElementById('footer').textContent = CFG_DATA.footer;
  renderStep1();
}

// ── STEP 1 ───────────────────────────────────────────
function renderStep1() {
  document.getElementById('card').innerHTML = `
    <div class="step-label">Étape 1 / 3</div>
    <div class="step-question">${CFG_DATA.step1.question}</div>
    <div class="step-desc">${CFG_DATA.step1.desc}</div>
    <div class="options" id="s1-opts">
      <div class="option" data-id="new" onclick="selectStep1(this)">
        <div class="opt-icon">✨</div>
        <div class="opt-text">
          <div class="opt-title">Je découvre l'association</div>
          <div class="opt-desc">Première fois que j'entends parler de vous</div>
        </div>
      </div>
      <div class="option" data-id="member" onclick="selectStep1(this)">
        <div class="opt-icon">🎭</div>
        <div class="opt-text">
          <div class="opt-title">Je suis déjà adhérent·e</div>
          <div class="opt-desc">J'ai déjà ma carte membre cette saison</div>
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn-next" id="btn1" disabled onclick="goStep2()">Continuer →</button>
    </div>`;
}

function selectStep1(el) {
  document.querySelectorAll('#s1-opts .option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  state.step1 = el.dataset.id;
  document.getElementById('btn1').disabled = false;
}

// ── STEP 2 ───────────────────────────────────────────
function goStep2() {
  const cats = CFG_DATA.step2.categories.filter(c => c.profiles.includes(state.step1));
  document.getElementById('card').innerHTML = `
    <div class="step-label">Étape 2 / 3</div>
    <div class="step-question">${CFG_DATA.step2.question}</div>
    <div class="step-desc">${CFG_DATA.step2.desc}</div>
    <div class="options" id="s2-opts">${cats.map(c => `
      <div class="option" data-id="${c.id}" onclick="selectStep2(this)">
        <div class="opt-icon">${c.icon}</div>
        <div class="opt-text">
          <div class="opt-title">${c.title}</div>
          <div class="opt-desc">${c.desc}</div>
        </div>
      </div>`).join('')}
    </div>
    <div class="actions">
      <button class="btn-back" onclick="renderStep1()">← Retour</button>
      <button class="btn-next" id="btn2" disabled onclick="goStep3()">Continuer →</button>
    </div>`;
}

function selectStep2(el) {
  document.querySelectorAll('#s2-opts .option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  state.step2 = el.dataset.id;
  document.getElementById('btn2').disabled = false;
}

// ── STEP 3 ───────────────────────────────────────────
function goStep3() {
  const q3 = step3Options[state.step2];
  if (!q3 || !q3.options.length) {
    document.getElementById('card').innerHTML = `<div class="error-wrap">
      <div class="error-icon">🔍</div>
      <div class="error-msg">Aucune option disponible pour le moment.<br>Contactez l'association.</div>
    </div>`;
    return;
  }
  document.getElementById('card').innerHTML = `
    <div class="step-label">Étape 3 / 3</div>
    <div class="step-question">${q3.question}</div>
    <div class="step-desc">${q3.desc}</div>
    <div class="options" id="s3-opts">${q3.options.map(o => `
      <div class="option" data-id="${o.id}" onclick="selectStep3(this)">
        <div class="opt-icon">${o.icon}</div>
        <div class="opt-text">
          <div class="opt-title">${o.title}</div>
          <div class="opt-desc">${o.desc}</div>
        </div>
      </div>`).join('')}
    </div>
    <div class="actions">
      <button class="btn-back" onclick="goStep2()">← Retour</button>
      <button class="btn-next" id="btn3" disabled onclick="showDest()">Voir où s'inscrire →</button>
    </div>`;
}

function selectStep3(el) {
  document.querySelectorAll('#s3-opts .option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  state.step3 = el.dataset.id;
  document.getElementById('btn3').disabled = false;
}

// ── DESTINATION ───────────────────────────────────────
function showDest() {
  const q3 = step3Options[state.step2];
  const opt = q3.options.find(o => o.id === state.step3);
  if (!opt) return;
  const details = opt.detail.map(d => `<div class="dest-detail"><span class="dest-detail-key">${d[0]}</span><span class="dest-detail-val">${d[1]}</span></div>`).join('');
  document.getElementById('card').innerHTML = `
    <div class="destination">
      <div class="dest-badge">Prêt à rejoindre le show</div>
      <div class="dest-icon">${opt.icon}</div>
      <div class="dest-title">${opt.destTitle || opt.title}</div>
      <div class="dest-desc">${opt.destDesc || opt.desc}</div>
      ${details ? '<div class="dest-details">' + details + '</div>' : ''}
      <a href="${opt.link}" class="btn-helloasso" target="_blank">S'inscrire sur HelloAsso →</a>
      <button class="btn-restart" onclick="restart()">Recommencer depuis le début</button>
    </div>`;
}

function restart() {
  state.step1 = state.step2 = state.step3 = null;
  renderStep1();
}

// ── START ─────────────────────────────────────────────
loadSheet();
</script>
</body>
</html>
