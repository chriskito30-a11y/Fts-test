<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Forum — Fais Ton Show</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
function setH(){document.documentElement.style.setProperty("--app-h",window.innerHeight+"px");}
setH();window.addEventListener("resize",setH);
window.addEventListener("orientationchange",function(){setTimeout(setH,200);});
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#f5f2ee;--red:#d4201a;--gold:#c9a84c;--grey:#1c1c1c;--grey2:#161616;--muted:#888;--border:#2a2a2a;--pending:#c9a84c}
html,body{height:100%;background:var(--black);color:var(--white);font-family:"DM Sans",sans-serif;overflow:hidden}
.app{display:flex;height:100vh;height:calc(var(--app-h,100vh))}
/* Sidebar */
.sidebar{width:220px;background:var(--grey2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-hdr{padding:1.2rem 1rem .8rem;border-bottom:1px solid var(--border)}
.sidebar-logo{font-family:"Bebas Neue",sans-serif;font-size:1.3rem;color:var(--red)}
.sidebar-sub{font-size:.6rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:.1rem}
.sidebar-user{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;border-bottom:1px solid var(--border);cursor:pointer}
.sidebar-user:hover .uname{color:var(--white)}
.uavatar{width:26px;height:26px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;color:var(--white);flex-shrink:0;text-transform:uppercase}
.uavatar.pending{background:var(--gold)}
.uname{font-size:.78rem;color:var(--muted);flex:1;transition:color .2s}
.uedit{font-size:.6rem;color:#333}
.channels-lbl{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:#444;padding:.8rem 1rem .4rem}
.channel-list{flex:1;overflow-y:auto;padding:.2rem 0}
.channel{display:flex;align-items:center;gap:.6rem;padding:.55rem 1rem;cursor:pointer;transition:background .15s;border-left:2px solid transparent;font-size:.82rem;color:var(--muted)}
.channel:hover{background:rgba(255,255,255,.03);color:var(--white)}
.channel.active{background:rgba(212,32,26,.08);border-left-color:var(--red);color:var(--white)}
.channel-icon{font-size:1rem;flex-shrink:0}
.sidebar-footer{padding:.8rem 1rem;border-top:1px solid var(--border)}
.back-link{font-size:.68rem;color:#444;text-decoration:none;display:flex;align-items:center;gap:.35rem;transition:color .2s}
.back-link:hover{color:var(--muted)}
/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.pending-bar{background:#1a1500;border-bottom:1px solid rgba(201,168,76,.3);padding:.55rem 1.4rem;font-size:.72rem;color:var(--gold);display:none;align-items:center;gap:.5rem;flex-shrink:0}
.pending-bar.show{display:flex}
.chat-hdr{padding:.9rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.8rem;flex-shrink:0;background:var(--grey2)}
.chat-icon{font-size:1.3rem}
.chat-title{font-family:"Bebas Neue",sans-serif;font-size:1.3rem;letter-spacing:.04em}
.chat-desc{font-size:.7rem;color:var(--muted);margin-top:.05rem}
.btn-admin-gear{background:transparent;border:none;cursor:pointer;font-size:1.1rem;padding:.2rem .4rem;opacity:.3;transition:opacity .2s;margin-left:.4rem}
.btn-admin-gear:hover{opacity:1}
.btn-admin-gear.active{opacity:1;filter:drop-shadow(0 0 4px var(--red))}
.admin-bar{background:#1a0a0a;border-bottom:1px solid #3a1a1a;padding:.4rem 1.4rem;font-size:.68rem;color:#aa5a5a;display:none;align-items:center;justify-content:space-between;flex-shrink:0}
.admin-bar.show{display:flex}
.btn-exit-admin{background:transparent;border:1px solid #3a1a1a;color:#aa5a5a;padding:.2rem .6rem;border-radius:2px;cursor:pointer;font-size:.65rem}
.btn-exit-admin:hover{border-color:var(--red);color:var(--white)}
/* Messages */
.messages{flex:1;overflow-y:auto;padding:1rem 1.4rem;display:flex;flex-direction:column;gap:.5rem;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
.day-sep{text-align:center;margin:.8rem 0;position:relative}
.day-sep::before{content:"";position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border)}
.day-sep span{position:relative;background:var(--black);padding:0 .8rem;font-size:.6rem;color:#444;letter-spacing:.1em;text-transform:uppercase}
.msg{display:flex;flex-direction:column;max-width:72%;animation:msgIn .18s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg.own{align-self:flex-end;align-items:flex-end}
.msg.other{align-self:flex-start;align-items:flex-start}
.msg-meta{font-size:.62rem;color:#555;margin-bottom:.2rem;display:flex;align-items:center;gap:.4rem}
.msg.own .msg-meta{flex-direction:row-reverse}
.msg-author{color:var(--gold);font-weight:500}
.msg-bubble{padding:.55rem .85rem;border-radius:3px;font-size:.83rem;line-height:1.55;word-break:break-word}
.msg.own .msg-bubble{background:rgba(212,32,26,.15);border:1px solid rgba(212,32,26,.25);border-bottom-right-radius:0}
.msg.other .msg-bubble{background:#141414;border:1px solid var(--border);border-bottom-left-radius:0}
.btn-del-msg{background:transparent;border:none;color:#555;cursor:pointer;font-size:.7rem;padding:.15rem .4rem;transition:color .2s;margin-top:.2rem;display:block}
.btn-del-msg:hover{color:var(--red)}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#333;text-align:center;gap:.5rem}
.empty-icon{font-size:2.5rem;opacity:.3}
/* Input */
.input-area{padding:.9rem 1.4rem;padding-bottom:calc(.9rem + env(safe-area-inset-bottom));border-top:1px solid var(--border);background:var(--grey2);flex-shrink:0}
.input-row{display:flex;gap:.6rem;align-items:flex-end}
.input-wrap{flex:1;background:#0e0e0e;border:1px solid var(--border);border-radius:3px;display:flex;align-items:flex-end;transition:border-color .2s}
.input-wrap:focus-within{border-color:rgba(212,32,26,.4)}
.msg-input{flex:1;background:transparent;border:none;color:var(--white);font-family:"DM Sans",sans-serif;font-size:.83rem;padding:.65rem .85rem;resize:none;outline:none;max-height:120px;line-height:1.5}
.msg-input::placeholder{color:#444}
.btn-send{background:var(--red);border:none;color:var(--white);width:38px;height:38px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0;font-size:1rem}
.btn-send:hover{background:#b71815}
.btn-attach{background:transparent;border:1px solid var(--border);color:var(--muted);width:38px;height:38px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-size:1rem}
.btn-attach:hover{border-color:var(--gold);color:var(--gold)}
.upload-bar{display:none;padding:.5rem 1.4rem;background:#0e0e0e;border-top:1px solid var(--border);font-size:.72rem;color:var(--muted);flex-shrink:0;align-items:center;gap:.8rem}
.upload-bar.show{display:flex}
.upload-track{flex:1;background:#2a2a2a;border-radius:2px;height:4px;overflow:hidden}
.upload-fill{height:100%;background:var(--red);width:0%;transition:width .2s;border-radius:2px}
.msg-img{max-width:100%;max-height:260px;border-radius:3px;margin-top:.3rem;display:block;cursor:pointer}
.msg-video{max-width:100%;max-height:260px;border-radius:3px;margin-top:.3rem;display:block}
.msg-pdf{display:inline-flex;align-items:center;gap:.5rem;margin-top:.3rem;padding:.4rem .8rem;background:#141414;border:1px solid var(--border);border-radius:3px;font-size:.75rem;color:var(--gold);text-decoration:none}
.msg-pdf:hover{border-color:var(--gold)}

/* MODIFICATION : STYLE DES PILLS (Nouveau) */
.pill-container{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.4rem}
.pill{background:#141414;border:1px solid var(--border);padding:.4rem .8rem;border-radius:20px;font-size:.75rem;cursor:pointer;transition:all .18s;color:var(--muted);user-select:none}
.pill:hover{border-color:var(--gold);color:var(--white)}
.pill.active{background:var(--red);border-color:var(--red);color:var(--white);font-weight:500}
.sub-group{margin-bottom:.9rem}
.sub-group-lbl{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:.45rem;display:flex;align-items:center;gap:.4rem}
.sub-group-lbl::after{content:"";flex:1;height:1px;background:#2a2a2a}
.no-sub-note{font-size:.7rem;color:#555;font-style:italic;padding:.3rem 0}
.pills-loading{font-size:.72rem;color:var(--muted);padding:.4rem 0}
.pills-error{font-size:.72rem;color:#aa5a5a;padding:.4rem 0}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--grey);border:1px solid var(--border);border-radius:4px;padding:2rem;width:95%;max-width:450px;animation:modalIn .25s ease;max-height:90vh;overflow-y:auto}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-icon{font-size:2rem;text-align:center;margin-bottom:.5rem}
.modal-title{font-family:"Bebas Neue",sans-serif;font-size:1.8rem;text-align:center;margin-bottom:.3rem}
.modal-desc{font-size:.78rem;color:var(--muted);text-align:center;line-height:1.5;margin-bottom:1.2rem}
.modal-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem;display:block}
.modal-input{width:100%;background:#0e0e0e;border:1px solid var(--border);border-radius:3px;color:var(--white);font-family:"DM Sans",sans-serif;font-size:.85rem;padding:.65rem .9rem;outline:none;transition:border-color .2s;margin-bottom:.8rem}
.modal-btn{width:100%;margin-top:.8rem;padding:.8rem;background:var(--red);border:none;color:var(--white);font-family:"Bebas Neue",sans-serif;font-size:1.1rem;letter-spacing:.08em;border-radius:3px;cursor:pointer;transition:background .2s}
.modal-btn:hover{background:#b71815}
.modal-btn.secondary{background:transparent;border:1px solid #333;color:var(--muted);font-family:"DM Sans",sans-serif;font-size:.8rem;letter-spacing:0;margin-top:.4rem}
.modal-err{font-size:.72rem;color:var(--red);text-align:center;min-height:1rem;margin-bottom:.3rem}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}

@media(max-width:640px){
  .sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--border);flex-shrink:0}
  .sidebar-hdr,.sidebar-user,.channels-lbl,.sidebar-footer{display:none}
  .channel-list{display:flex;flex-direction:row;padding:.4rem .5rem;gap:.3rem;overflow-x:auto;width:100%}
  .channel{padding:.4rem .75rem;border-left:none;border-bottom:2px solid transparent;border-radius:3px;white-space:nowrap;font-size:.75rem}
  .channel.active{border-bottom-color:var(--red);background:rgba(212,32,26,.08)}
  .app{flex-direction:column}
  .main{flex:1;min-height:0}
  .messages{padding:.8rem}
  .msg{max-width:88%}
  .input-area{padding:.7rem .8rem;padding-bottom:calc(.7rem + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>

<div class="modal-overlay hidden" id="reg-modal">
  <div class="modal">
    <div class="modal-icon">🎭</div>
    <div class="modal-title">Inscription</div>
    <div class="modal-row">
      <div>
        <label class="modal-label">Prénom</label>
        <input class="modal-input" id="reg-first" type="text" placeholder="Prénom…" maxlength="24">
      </div>
      <div>
        <label class="modal-label">Nom</label>
        <input class="modal-input" id="reg-last" type="text" placeholder="Nom…" maxlength="24">
      </div>
    </div>
    
    <label class="modal-label">Discipline(s) — clique pour sélectionner</label>
    <div class="pill-container" id="reg-cat-pills"><span class="pills-loading">Chargement des disciplines…</span></div>
    <div id="reg-sub-groups"></div>
    
    <div class="modal-err" id="reg-err"></div>
    <button class="modal-btn" onclick="submitRegistration()">Rejoindre le forum →</button>
  </div>
</div>

<div class="modal-overlay hidden" id="admin-modal">
  <div class="modal">
    <div class="modal-icon">⚙️</div>
    <div class="modal-title">Administration</div>
    <input class="modal-input" id="admin-pwd-input" type="password" placeholder="Mot de passe…" style="margin-top:1rem">
    <div class="modal-err" id="admin-err"></div>
    <button class="modal-btn" onclick="checkAdminPwd()">Accéder →</button>
    <button class="modal-btn secondary" onclick="closeAdminModal()">Annuler</button>
  </div>
</div>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-hdr">
      <div class="sidebar-logo">FAIS TON SHOW</div>
      <div class="sidebar-sub">Forum</div>
    </div>
    <div class="sidebar-user" onclick="editRegistration()">
      <div class="uavatar" id="uavatar">?</div>
      <div class="uname" id="uname">…</div>
      <div class="uedit">✏️</div>
    </div>
    <div class="channels-lbl">Canaux</div>
    <div class="channel-list" id="channel-list"></div>
    <div class="sidebar-footer">
      <a class="back-link" href="membres.html">← Espace membres</a>
    </div>
  </div>

  <div class="main">
    <div class="pending-bar" id="pending-bar">⏳ Inscription en attente de validation</div>
    <div class="admin-bar" id="admin-bar">
      ⚠️ Mode administration
      <button class="btn-exit-admin" onclick="exitAdmin()">Quitter</button>
    </div>
    <div class="chat-hdr">
      <div class="chat-icon" id="ch-icon">💬</div>
      <div>
        <div class="chat-title" id="ch-title">Général</div>
        <div class="chat-desc" id="ch-desc">Discussion ouverte à tous</div>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:.3rem">
        <button class="btn-admin-gear" id="btn-gear" onclick="openAdminModal()">⚙️</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="upload-bar" id="upload-bar">
      <span id="upload-txt">Upload en cours…</span>
      <div class="upload-track"><div class="upload-fill" id="upload-fill"></div></div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <input type="file" id="file-input" accept="image/*,video/*,.pdf,.mp3" style="display:none" onchange="uploadMedia(this.files[0])">
        <button class="btn-attach" onclick="document.getElementById('file-input').click()" title="Joindre un fichier">📎</button>
        <div class="input-wrap">
          <textarea class="msg-input" id="msg-input" placeholder="Écris un message…" rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="btn-send" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBlN-h7D-QWyGmZ4B59AVJkDIQ5molioq0",
  authDomain: "faistonshow30.firebaseapp.com",
  databaseURL: "https://faistonshow30-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "faistonshow30",
  storageBucket: "faistonshow30.firebasestorage.app",
  messagingSenderId: "115713812172",
  appId: "1:115713812172:web:db8db53a9a9ad819f00469"
};
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6zQRcJLBGzmnrMQcFnnfiUwNTUbFTmL3Cg3Wv9HP6p9DXIVHlNdLd07a-QETaHX5NQ4mUr78lx_ox/pub?gid=199619478&single=true&output=csv";
const ADMIN_PWD = "admin2026";
const CLOUD_NAME = "dsylvtwqr";
const UPLOAD_PRESET = "FaisTonShow";

let db, firebaseOk = false;
let uid, userData;
let currentChannel = "general";
let currentListener = null;
let adminMode = false;
let allGroups = []; 

function norm(s){ return String(s).toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,""); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function catIcon(s){ const c=norm(s); if(c.includes("theat"))return"🎭"; if(c.includes("dans"))return"💃"; if(c.includes("musi")||c.includes("chant"))return"🎸"; return"💬"; }
function storageSet(k,v){localStorage.setItem(k,v);}
function storageGet(k){return localStorage.getItem(k);}
function genUID(){return"u"+Math.random().toString(36).substr(2,9);}
function scrollBottom(){const w=document.getElementById("messages");w.scrollTop=w.scrollHeight;}

document.addEventListener("DOMContentLoaded",async function(){
  try{ firebase.initializeApp(FIREBASE_CONFIG); db=firebase.database(); firebaseOk=true; }catch(e){}
  await loadGroups();
  uid=storageGet("fts_forum_uid");
  if(uid && firebaseOk){ await loadUserData(); }else{ showRegModal(); }
});

async function loadGroups(){
  try{
    const r=await fetch(SHEET_URL);
    if(!r.ok) throw new Error("HTTP "+r.status);
    const text=await r.text();
    const rows=parseCSV(text);
    allGroups=[];
    rows.forEach(row => {
      const cat=(row[0]||"").trim(), sub=(row[1]||"").trim();
      if(cat){ allGroups.push({cat,sub}); }
    });
    if(allGroups.length){ buildCatPills(); }
    else{ document.getElementById("reg-cat-pills").innerHTML='<span class="pills-error">Aucune discipline trouvée dans le Sheet.</span>'; }
  }catch(e){
    console.error("Sheet:",e);
    document.getElementById("reg-cat-pills").innerHTML='<span class="pills-error">Impossible de charger les disciplines. Vérifie que le Sheet est bien publié.</span>';
  }
}

function parseCSV(t){
  var r=[],ls=t.trim().split("\n");
  for(var li=1;li<ls.length;li++){
    var row=ls[li],c=[],s="",q=false;
    for(var i=0;i<row.length;i++){
      if(row[i]==='"'){q=!q;}else if(row[i]===","&&!q){c.push(s.trim());s="";}else{s+=row[i];}
    }
    c.push(s.trim()); r.push(c);
  }
  return r;
}

// MODIFICATION : Pills groupées par discipline
function buildCatPills(){
  const cats=[...new Set(allGroups.map(g => g.cat))];
  const cont=document.getElementById("reg-cat-pills");
  cont.innerHTML=cats.map(c => `<div class="pill" onclick="togglePill(this,'cat')">${esc(c)}</div>`).join("");
}

function togglePill(el, type){
  el.classList.toggle("active");
  if(type==="cat") updateSubGroups();
}

function updateSubGroups(){
  const activeSubs=Array.from(document.querySelectorAll(".sub-pills .pill.active")).map(p=>p.textContent);
  const activeCats=Array.from(document.querySelectorAll("#reg-cat-pills .pill.active")).map(p=>p.textContent);
  const wrap=document.getElementById("reg-sub-groups");
  if(!activeCats.length){wrap.innerHTML="";return;}
  wrap.innerHTML=activeCats.map(cat=>{
    const subs=[...new Set(allGroups.filter(g=>g.cat===cat&&g.sub).map(g=>g.sub))];
    if(!subs.length) return `<div class="sub-group"><div class="sub-group-lbl">${catIcon(cat)} ${esc(cat)}</div><p class="no-sub-note">Pas de créneau spécifique pour cette discipline.</p></div>`;
    return `<div class="sub-group"><div class="sub-group-lbl">${catIcon(cat)} ${esc(cat)}</div><div class="pill-container sub-pills">${subs.map(s=>`<div class="pill${activeSubs.includes(s)?" active":""}" onclick="togglePill(this,'sub')">${esc(s)}</div>`).join("")}</div></div>`;
  }).join("");
}

function showRegModal(){
  document.getElementById("reg-err").textContent="";
  document.getElementById("reg-modal").classList.remove("hidden");
}

async function submitRegistration(){
  const first=document.getElementById("reg-first").value.trim();
  const last=document.getElementById("reg-last").value.trim();
  const cats=Array.from(document.querySelectorAll("#reg-cat-pills .pill.active")).map(p => p.textContent);
  const subs=Array.from(document.querySelectorAll(".sub-pills .pill.active")).map(p => p.textContent);

  if(!first){document.getElementById("reg-err").textContent="Prénom requis.";return;}
  if(cats.length===0){document.getElementById("reg-err").textContent="Choisis au moins une discipline.";return;}
  
  if(!uid) uid=genUID();
  storageSet("fts_forum_uid",uid);
  
  const data={
    name: last ? first+" "+last : first,
    group: cats.join(", "),
    subgroup: subs.join(", "),
    status: "pending",
    ts: Date.now()
  };
  userData=data;
  await db.ref("fts_forum/users/"+uid).set(data);
  listenUserStatus();
  document.getElementById("reg-modal").classList.add("hidden");
  enterForum();
}

function editRegistration(){
  if(!userData)return;
  document.getElementById("reg-first").value = userData.name.split(" ")[0];
  document.getElementById("reg-last").value = userData.name.split(" ").slice(1).join(" ");
  const cats=(userData.group||"").split(", ").filter(Boolean);
  const subs=(userData.subgroup||"").split(", ").filter(Boolean);
  document.querySelectorAll("#reg-cat-pills .pill").forEach(p=>{p.classList.toggle("active",cats.includes(p.textContent));});
  updateSubGroups();
  document.querySelectorAll(".sub-pills .pill").forEach(p=>{p.classList.toggle("active",subs.includes(p.textContent));});
  showRegModal();
}

async function loadUserData(){
  const snap=await db.ref("fts_forum/users/"+uid).once("value");
  if(snap.exists()){ userData=snap.val(); listenUserStatus(); enterForum(); }
  else showRegModal();
}

function listenUserStatus(){
  db.ref("fts_forum/users/"+uid+"/status").on("value",snap => {
    if(snap.exists()){ userData.status=snap.val(); updateStatusUI(); renderChannels(); }
  });
}

function enterForum(){
  document.getElementById("uavatar").textContent=userData.name.charAt(0);
  document.getElementById("uname").textContent=userData.name;
  updateStatusUI();
  renderChannels();
  switchChannel("general");
}

function updateStatusUI(){
  document.getElementById("pending-bar").classList.toggle("show", userData.status==="pending");
}

// MODIFICATION : Création des canaux pour les sous-catégories
function getUserChannels(){
  const channels=[{id:"general",icon:"💬",name:"Général",desc:"Ouvert à tous"}];
  if(userData && userData.status==="active"){
    if(userData.group){
      userData.group.split(", ").forEach(c => {
        channels.push({id: norm(c), icon: catIcon(c), name: c, desc: "Canal "+c});
      });
    }
    if(userData.subgroup){
      userData.subgroup.split(", ").forEach(s => {
        channels.push({id: norm(s), icon: "📅", name: s, desc: "Canal créneau "+s});
      });
    }
  }
  return channels;
}

function renderChannels(){
  const list=document.getElementById("channel-list");
  const channels=getUserChannels();
  list.innerHTML=channels.map(c => `
    <div class="channel${c.id===currentChannel?" active":""}" onclick="switchChannel('${c.id}')">
      <span class="channel-icon">${c.icon}</span>
      <span>${esc(c.name)}</span>
    </div>`).join("");
}

function switchChannel(id){
  const ch = getUserChannels().find(c => c.id===id) || getUserChannels()[0];
  currentChannel=ch.id;
  renderChannels();
  document.getElementById("ch-icon").textContent=ch.icon;
  document.getElementById("ch-title").textContent=ch.name;
  document.getElementById("ch-desc").textContent=ch.desc;
  document.getElementById("messages").innerHTML="";
  if(currentListener) currentListener();
  loadMessages(ch.id);
}

function loadMessages(id){
  const ref=db.ref("fts_forum/messages/"+id).limitToLast(50);
  ref.on("child_added", snap => {
    appendMsg(snap.val(), snap.val().name===userData.name, snap.key);
  });
  currentListener = () => ref.off();
}

function sendMessage(){
  const input=document.getElementById("msg-input");
  const txt=input.value.trim();
  if(!txt)return;
  db.ref("fts_forum/messages/"+currentChannel).push({name:userData.name, text:txt, ts:Date.now()});
  input.value=""; input.style.height="";
}

function appendMsg(m, own, key){
  const wrap=document.getElementById("messages");
  const div=document.createElement("div");
  div.className="msg "+(own?"own":"other");
  const isMedia = m.text && m.text.startsWith("[media]");
  const mediaUrl = isMedia ? m.text.slice(7) : null;
  div.innerHTML=`
    <div class="msg-meta">${!own?`<span class="msg-author">${esc(m.name)}</span>`:""} <span>${new Date(m.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span></div>
    ${isMedia
      ? `<div class="msg-bubble">${renderMedia(mediaUrl)}</div>`
      : `<div class="msg-bubble">${esc(m.text).replace(/\n/g,"<br>")}</div>`
    }
    ${adminMode?`<button class="btn-del-msg" onclick="deleteMsg('${key}')">🗑</button>`:""}`;
  wrap.appendChild(div); scrollBottom();
}

function deleteMsg(k){ if(confirm("Supprimer ?")) db.ref("fts_forum/messages/"+currentChannel+"/"+k).remove(); }
function openAdminModal(){ document.getElementById("admin-modal").classList.remove("hidden"); }
function closeAdminModal(){ document.getElementById("admin-modal").classList.add("hidden"); }
function checkAdminPwd(){
  if(document.getElementById("admin-pwd-input").value===ADMIN_PWD){ closeAdminModal(); adminMode=true; document.getElementById("admin-bar").classList.add("show"); switchChannel(currentChannel); }
}
function exitAdmin(){ adminMode=false; document.getElementById("admin-bar").classList.remove("show"); switchChannel(currentChannel); }
function uploadMedia(file){
  if(!file)return;
  if(file.size>100*1024*1024){alert("Fichier trop volumineux (max 100 Mo)");return;}
  const bar=document.getElementById("upload-bar");
  const fill=document.getElementById("upload-fill");
  const txt=document.getElementById("upload-txt");
  bar.classList.add("show");
  fill.style.width="0%";
  fill.style.background="var(--red)";
  txt.textContent="Upload en cours…";
  const fd=new FormData();
  fd.append("file",file);
  fd.append("upload_preset",UPLOAD_PRESET);
  fd.append("resource_type","auto");
  const xhr=new XMLHttpRequest();
  xhr.open("POST","https://api.cloudinary.com/v1_1/"+CLOUD_NAME+"/auto/upload");
  xhr.upload.onprogress=function(e){
    if(e.lengthComputable){
      const pct=Math.round(e.loaded/e.total*100);
      fill.style.width=pct+"%";
      txt.textContent="Upload "+pct+"%…";
    }
  };
  xhr.onload=function(){
    if(xhr.status===200){
      const res=JSON.parse(xhr.responseText);
      fill.style.background="#22c55e";
      txt.textContent="✓ "+file.name;
      setTimeout(function(){bar.classList.remove("show");},2000);
      document.getElementById("file-input").value="";
      // Send as message with special prefix
      if(firebaseOk&&userData){
        db.ref("fts_forum/messages/"+currentChannel).push({
          name:userData.name, text:"[media]"+res.secure_url, ts:Date.now()
        });
      }
    }else{
      txt.textContent="Erreur upload";
      setTimeout(function(){bar.classList.remove("show");},3000);
    }
  };
  xhr.onerror=function(){
    txt.textContent="Erreur réseau";
    setTimeout(function(){bar.classList.remove("show");},3000);
  };
  xhr.send(fd);
}
function renderMedia(url){
  const ext=url.split("?")[0].split(".").pop().toLowerCase();
  if(["jpg","jpeg","png","gif","webp"].includes(ext))
    return `<img class="msg-img" src="${url}" onclick="window.open('${url}')">`;
  if(["mp4","mov","webm"].includes(ext))
    return `<video class="msg-video" src="${url}" controls></video>`;
  if(ext==="mp3")
    return `<audio controls style="margin-top:.3rem;width:100%"><source src="${url}"></audio>`;
  if(ext==="pdf")
    return `<a class="msg-pdf" href="${url}" target="_blank">📄 Ouvrir le PDF</a>`;
  return `<a class="msg-pdf" href="${url}" target="_blank">📎 Fichier joint</a>`;
}

function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height="auto";el.style.height=el.scrollHeight+"px";}
</script>
