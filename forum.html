<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Forum — Fais Ton Show</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#f5f2ee;--red:#d4201a;--gold:#c9a84c;--grey:#1c1c1c;--grey2:#161616;--muted:#888;--border:#2a2a2a;--pending:#c9a84c}
html,body{height:100%;background:var(--black);color:var(--white);font-family:"DM Sans",sans-serif;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:220px;background:var(--grey2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-hdr{padding:1.2rem 1rem .8rem;border-bottom:1px solid var(--border)}
.sidebar-logo{font-family:"Bebas Neue",sans-serif;font-size:1.3rem;color:var(--red)}
.sidebar-sub{font-size:.6rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:.1rem}
.sidebar-user{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;border-bottom:1px solid var(--border);cursor:pointer}
.uavatar{width:26px;height:26px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600}
.uname{font-size:.78rem;color:var(--muted);flex:1}
.channels-lbl{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:#444;padding:.8rem 1rem .4rem}
.channel-list{flex:1;overflow-y:auto;padding:.2rem 0}
.channel{display:flex;align-items:center;gap:.6rem;padding:.55rem 1rem;cursor:pointer;border-left:2px solid transparent;font-size:.82rem;color:var(--muted)}
.channel.active{background:rgba(212,32,26,.08);border-left-color:var(--red);color:var(--white)}
.sidebar-footer{padding:.8rem 1rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.5rem}
.back-link{font-size:.68rem;color:#444;text-decoration:none}
.main{flex:1;display:flex;flex-direction:column}
.pending-bar{background:#1a1500;border-bottom:1px solid rgba(201,168,76,.3);padding:.55rem 1.4rem;font-size:.72rem;color:var(--gold);display:none}
.pending-bar.show{display:flex}
.chat-hdr{padding:.9rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.8rem;background:var(--grey2)}
.chat-title{font-family:"Bebas Neue",sans-serif;font-size:1.3rem}
.chat-desc{font-size:.7rem;color:var(--muted)}
.messages{flex:1;overflow-y:auto;padding:1rem 1.4rem;display:flex;flex-direction:column;gap:.5rem}
.msg{display:flex;flex-direction:column;max-width:72%}
.msg.own{align-self:flex-end}
.msg.other{align-self:flex-start}
.msg-meta{font-size:.62rem;color:#555;margin-bottom:.2rem}
.msg-author{color:var(--gold)}
.msg-bubble{padding:.55rem .85rem;border-radius:3px;font-size:.83rem;line-height:1.55;word-break:break-word}
.msg.own .msg-bubble{background:rgba(212,32,26,.15);border:1px solid rgba(212,32,26,.25)}
.msg.other .msg-bubble{background:#141414;border:1px solid var(--border)}
.input-area{padding:.9rem 1.4rem;border-top:1px solid var(--border);background:var(--grey2)}
.input-row{display:flex;gap:.6rem;align-items:flex-end}
.input-wrap{flex:1;background:#0e0e0e;border:1px solid var(--border);border-radius:3px;display:flex}
.msg-input{flex:1;background:transparent;border:none;color:var(--white);font-size:.83rem;padding:.65rem .85rem;resize:none;outline:none}
.btn-send{background:var(--red);border:none;color:var(--white);width:38px;height:38px;border-radius:3px;cursor:pointer}
.btn-attach{background:transparent;border:1px solid var(--border);color:var(--muted);width:38px;height:38px;border-radius:3px;cursor:pointer}
.btn-attach:hover{border-color:var(--gold);color:var(--gold)}
.upload-bar{display:none;padding:.5rem 1.4rem;background:#0e0e0e;border-top:1px solid var(--border);font-size:.72rem;color:var(--muted);align-items:center;gap:.8rem}
.upload-bar.show{display:flex}
.upload-track{flex:1;background:#2a2a2a;border-radius:2px;height:4px;overflow:hidden}
.upload-fill{height:100%;background:var(--red);width:0%;transition:width .2s}
.msg-img,.msg-video{max-width:100%;max-height:260px;border-radius:3px;margin-top:.3rem;display:block}
.msg-pdf{display:inline-flex;align-items:center;gap:.5rem;margin-top:.3rem;padding:.4rem .8rem;background:#141414;border:1px solid var(--border);border-radius:3px;font-size:.75rem;color:var(--gold);text-decoration:none}
.pill-container{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem}
.pill{background:#141414;border:1px solid var(--border);padding:.4rem .7rem;border-radius:20px;font-size:.75rem;cursor:pointer;color:var(--muted)}
.pill.active{background:var(--red);border-color:var(--red);color:#fff}
.btn-notif{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.35rem .8rem;border-radius:20px;cursor:pointer;font-size:.68rem;text-align:left}
.btn-notif.on{border-color:var(--gold);color:var(--gold)}
.notif-banner{background:linear-gradient(135deg,rgba(212,32,26,.15),rgba(201,168,76,.1));border-bottom:1px solid rgba(212,32,26,.3);padding:.8rem 1.4rem;display:flex;align-items:center;gap:.8rem}
.notif-banner.hidden{display:none}
@media(max-width:640px){.app{flex-direction:column}.sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border)}}
</style>
</head>
<body>

<div class="app">
<div class="sidebar">
<div class="sidebar-hdr">
<div class="sidebar-logo">FAIS TON SHOW</div>
<div class="sidebar-sub">Forum</div>
</div>

<div class="sidebar-user">
<div class="uavatar" id="uavatar">?</div>
<div class="uname" id="uname">…</div>
</div>

<div class="channels-lbl">Canaux</div>
<div class="channel-list" id="channel-list"></div>

<div class="sidebar-footer">
<button class="btn-notif" id="btn-notif" onclick="toggleNotifications()">🔕 Activer les notifs</button>
<a class="back-link" href="membres.html">← Espace membres</a>
</div>
</div>

<div class="main">
<div class="pending-bar" id="pending-bar">⏳ Inscription en attente de validation</div>

<div class="chat-hdr">
<div>
<div class="chat-title" id="ch-title">Général</div>
<div class="chat-desc" id="ch-desc">Discussion ouverte à tous</div>
</div>
</div>

<div class="notif-banner hidden" id="notif-banner">
<div>🔔 Active les notifications pour ton groupe</div>
<button onclick="activerNotifs()">Activer</button>
</div>

<div class="messages" id="messages"></div>

<div class="upload-bar" id="upload-bar">
<span id="upload-txt">Upload en cours…</span>
<div class="upload-track">
<div class="upload-fill" id="upload-fill"></div>
</div>
</div>

<div class="input-area">
<div class="input-row">
<input type="file" id="file-input" accept="image/*,video/*,.pdf,.mp3" style="display:none" onchange="uploadMedia(this.files[0])">
<button class="btn-attach" onclick="document.getElementById('file-input').click()">📎</button>

<div class="input-wrap">
<textarea class="msg-input" id="msg-input" placeholder="Écris un message…"></textarea>
</div>

<button class="btn-send" onclick="sendMessage()">➤</button>
</div>
</div>
</div>
</div>

<script>
const FIREBASE_CONFIG={
apiKey:"AIzaSyBlN-h7D-QWyGmZ4B59AVJkDIQ5molioq0",
authDomain:"faistonshow30.firebaseapp.com",
databaseURL:"https://faistonshow30-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"faistonshow30"
};

const CLOUD_NAME="dsylvtwqr";
const UPLOAD_PRESET="FaisTonShow";
const WORKER_URL="https://fts-push.gros-christophe.workers.dev";
const VAPID_PUBLIC_KEY="BNenngaKqOtgqvFSo2KJipS0AwVChpzacAX5YSNZmizWLeji07auoKRZBMbOxRljvqz89QigB6esPcHfEDS_nik";

firebase.initializeApp(FIREBASE_CONFIG);
const db=firebase.database();

let currentChannel="general";
let userData={name:"Utilisateur",status:"active",group:"General"};

function esc(s){return String(s).replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function sendMessage(){
const input=document.getElementById("msg-input");
const txt=input.value.trim();
if(!txt)return;

db.ref("fts_forum/messages/"+currentChannel).push({
name:userData.name,
text:txt,
ts:Date.now()
});

notifyChannel(currentChannel,userData.name+" : "+txt.substring(0,80));

input.value="";
}

function loadMessages(){
const ref=db.ref("fts_forum/messages/"+currentChannel).limitToLast(50);
ref.on("child_added",snap=>{
appendMsg(snap.val());
});
}

function appendMsg(m){
const wrap=document.getElementById("messages");
const div=document.createElement("div");
const own=m.name===userData.name;
const isMedia=m.text&&m.text.startsWith("[media]");
const mediaUrl=isMedia?m.text.slice(7):null;

div.className="msg "+(own?"own":"other");

div.innerHTML=`
<div class="msg-meta">
${!own?`<span class="msg-author">${esc(m.name)}</span>`:""}
<span>${new Date(m.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
</div>

${isMedia
? `<div class="msg-bubble">${renderMedia(mediaUrl)}</div>`
: `<div class="msg-bubble">${esc(m.text)}</div>`}
`;

wrap.appendChild(div);
wrap.scrollTop=wrap.scrollHeight;
}

function uploadMedia(file){
if(!file)return;

const bar=document.getElementById("upload-bar");
const fill=document.getElementById("upload-fill");
const txt=document.getElementById("upload-txt");

bar.classList.add("show");

const fd=new FormData();
fd.append("file",file);
fd.append("upload_preset",UPLOAD_PRESET);
fd.append("resource_type","auto");

const xhr=new XMLHttpRequest();

xhr.open("POST","https://api.cloudinary.com/v1_1/"+CLOUD_NAME+"/auto/upload");

xhr.upload.onprogress=function(e){
if(e.lengthComputable){
const pct=Math.round(e.loaded/e.total*100);
fill.style.width=pct+"%";
txt.textContent="Upload "+pct+"%…";
}
};

xhr.onload=function(){
if(xhr.status===200){
const res=JSON.parse(xhr.responseText);

fill.style.background="#22c55e";
txt.textContent="✓ Upload terminé";

setTimeout(()=>{
bar.classList.remove("show");
},2000);

 db.ref("fts_forum/messages/"+currentChannel).push({
name:userData.name,
text:"[media]"+res.secure_url,
ts:Date.now()
});
}
};

xhr.send(fd);
}

function renderMedia(url){
const ext=url.split(".").pop().toLowerCase();

if(["jpg","jpeg","png","gif","webp"].includes(ext)){
return `<img class="msg-img" src="${url}">`;
}

if(["mp4","mov","webm"].includes(ext)){
return `<video class="msg-video" src="${url}" controls></video>`;
}

if(["mp3","wav","ogg"].includes(ext)){
return `<audio controls style="width:100%"><source src="${url}"></audio>`;
}

if(ext==="pdf"){
return `<a class="msg-pdf" href="${url}" target="_blank">📄 Ouvrir PDF</a>`;
}

return `<a class="msg-pdf" href="${url}" target="_blank">📎 Fichier joint</a>`;
}

function urlBase64ToUint8Array(b64){
const pad="=".repeat((4-b64.length%4)%4);
const base64=(b64+pad).replace(/-/g,"+").replace(/_/g,"/");
const raw=window.atob(base64);
const arr=new Uint8Array(raw.length);
for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
return arr;
}

async function toggleNotifications(){
alert("Notifications activées");
}

async function activerNotifs(){
document.getElementById("notif-banner").classList.add("hidden");
await toggleNotifications();
}

function notifyChannel(channel,body){
fetch(WORKER_URL+"/notify",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({title:"FTS",body,url:"/forum.html"})
}).catch(()=>{});
}

loadMessages();
</script>
</body>
</html>
